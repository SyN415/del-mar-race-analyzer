services:
  - type: web
    name: trackstarai
    env: python
    buildCommand: ./build.sh
    startCommand: ./start.sh
    envVars:
      - key: PORT
        sync: false
      - key: RELOAD
        value: "false"
      - key: LOG_LEVEL
        value: "info"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: TRACKSTAR_AI_DEFAULT_MODEL
        value: "x-ai/grok-4.20-beta"
      - key: TRACKSTAR_AI_AVAILABLE_MODELS
        value: "google/gemini-3.1-flash-lite-preview,x-ai/grok-4.20-beta,openai/gpt-5.4"
      - key: TRACKSTAR_ADMIN_PASSWORD
        sync: false
      - key: TRACKSTAR_AUTH_SECRET
        sync: false
      - key: TWOCAPTCHA_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: "production"
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "/opt/render/project/.cache/ms-playwright"
    disk:
      name: trackstar-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
